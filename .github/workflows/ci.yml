name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tareas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tareas_test
    steps:
      - uses: actions/checkout@v5

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar migraciones en la base de datos de test
        run: npx prisma migrate deploy

      - name: Ejecutar tests unitarios
        run: npm test

      - name: Ejecutar tests de integración
        run: npm run test:integration

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5

      - name: Build de la imagen Docker
        run: docker build -t tareas-api:ci .

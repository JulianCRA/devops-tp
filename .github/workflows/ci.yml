name: CI

on:
  push:
    branches: ['**']
    paths-ignore:
      - '**.md'
      - 'extra_docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'extra_docs/**'

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tareas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tareas_test
    steps:
      - uses: actions/checkout@v5

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar migraciones en la base de datos de test
        run: npx prisma migrate deploy

      - name: Ejecutar tests unitarios
        run: npm test

      - name: Ejecutar tests de integración
        run: npm run test:integration

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - name: Build de la imagen Docker
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          cache-to: type=gha,mode=max

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_name == 'main'
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Detectar tag de versión en este commit
        id: version
        run: |
          TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -n "$TAG" ]; then
            VERSION="${TAG#v}"
            MINOR="${VERSION%.*}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "minor=${MINOR}" >> $GITHUB_OUTPUT
          fi

      - uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/tareas-api
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ steps.version.outputs.version != '' }}
            type=raw,value=${{ steps.version.outputs.minor }},enable=${{ steps.version.outputs.minor != '' }}

      - name: Login a Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y push de la imagen
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

  deploy:
    runs-on: ubuntu-latest
    needs: publish
    if: github.ref_name == 'main' && needs.publish.outputs.version != ''
    steps:
      - uses: actions/checkout@v5

      - name: Instalar dependencias
        run: npm ci

      - name: Aplicar migraciones en producción
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma migrate deploy

      - name: Desplegar en Render
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          IMG="docker.io/${DOCKERHUB_USERNAME}/tareas-api:${VERSION}"
          curl -fsSL -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"imageUrl\": \"${IMG}\"}"
